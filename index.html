<!DOCTYPE html>
<html lang="sk">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>MP3HQ | ERIK CERVENAK</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
  <header>
    <h1>ERIK CERVENAK</h1>
    <div id="visualizer"></div>
  </header>

  <main>
    <div class="player">
      <img src="images/album.jpg" alt="Album cover" class="album-cover">
      <h2 id="song-title">Názov piesne</h2>
      <div class="controls">
        <button id="prev">⏮️</button>
        <button id="play">▶️</button>
        <button id="next">⏭️</button>
        <button id="like">❤️</button>
      </div>
    </div>

    <div class="settings">
      <label><input type="checkbox" id="eq"> Equalizer ON/OFF</label>
      <label><input type="checkbox" id="bass"> MegaBass ON/OFF</label>
    </div>

    <section id="song-list">
      <h3>Všetky piesne</h3>
      <ul>
        <li>Interpret 1 - Song 1</li>
        <li>Interpret 2 - Song 2</li>
      </ul>
    </section>
  </main>

  <footer>
    <p>ERIK CERVENAK | 2025</p>
  </footer>

  <script src="js/script.js"></script>
</body>
</html>
